{% load mptt_tags %}

<div class="card sidebar-card mb-4">
    <div class="card-header">Categories</div>
    <div class="card-body">
        <ul>
            {% recursetree sidebar_categories %}
                <li>
                    <a href="{{ node.get_absolute_url }}">{{ node.title }}</a>
                </li>

                {% if not node.is_leaf_node %}
                    <ul>
                        {{ children }}
                    </ul>
                {% endif %}
            {% endrecursetree %}
        </ul>
    </div>
</div>
<div class="card sidebar-card">
    <div class="card-body">
        <a href="{% url 'latest_post_feed' %}" class="text-decoration-none">
            Subscribe to the RSS feed
        </a>
    </div>
</div>
