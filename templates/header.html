<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand" href="{% url 'home' %}">DevJournal</a>

        {% if request.user.is_authenticated %}
            <div class="d-flex align-items-center gap-3">

                <span class="text-white-50 small">
                    {{ request.user.username }}
                </span>

                <a href="{% url 'post_create' %}" class="btn btn-outline-light btn-sm">
                    Add post
                </a>

                <a href="{% url 'my_posts' %}" class="text-white text-decoration-none">
                    My posts
                </a>

                <a href="{% url 'profile_detail' request.user.profile.slug %}" class="text-white text-decoration-none">
                    My profile
                </a>

                <form action="{% url 'logout' %}" method="post" class="mb-0">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-sm btn-light">
                        Log Out
                    </button>
                </form>
            </div>
        {% else %}
            <ul class="nav">
                <li>
                    <a href="{% url 'register' %}" class="nav-link px-2 text-white">Sign up</a>
                </li>
                <li>
                    <a href="{% url 'login' %}" class="nav-link px-2 text-white">Sign in</a>
                </li>
            </ul>
        {% endif %}
    </div>
</nav>
